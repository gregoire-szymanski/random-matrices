# Config 6
# Rotated covariance: Cov = U * Sigma * U^T, with U Haar orthogonal.
# Spectrum is controlled by Sigma eigenvalues; U randomizes eigenvectors.

global:
  seed: 20260408
  output_dir: outputs/config_rotated_haar
  log_level: INFO
  save_figures: true
  save_arrays: true
  save_metadata: true

simulation:
  d: 100
  T: 1.0
  n_steps: 450
  initial_state: 0.0
  drift_model:
    kind: time_sine
    amplitude: 0.02
    frequency: 1.0
    phase: 0.0
    direction: [1.0]

volatility:
  mode: constant
  constant_model:
    kind: orthogonal_diag
    orthogonal:
      method: haar
    eigen_distribution:
      kind: dirac_mixture
      values: [0.35, 0.90, 1.60, 2.40]
      weights: [0.20, 0.35, 0.30, 0.15]
    sampling_policy: draw_once
    jitter: 1.0e-10

mp_forward:
  aspect_ratio: 0.22
  grid_min: 0.0
  grid_max: 6.5
  num_points: 560
  eta: 0.0035
  tol: 1.0e-9
  max_iter: 560
  damping: 0.72

mp_inverse:
  method: optimization
  compare_methods: [optimization, stieltjes_based, fixed_point]
  n_support: 55
  support_min: 0.05
  support_max: 4.5
  eta: 0.0035
  tol: 1.0e-6
  max_iter: 320
  regularization: 8.0e-4
  optimizer_max_iter: 110
  forward_max_iter: 240
  forward_tol: 1.0e-7

analysis:
  realized_covariance_normalization: total_time
  empirical_histogram_bins: 50

plotting:
  style: default
  figsize: [10, 5]
  dpi: 130
  show: false
  plot_paths: true
  max_path_dims: 5
  plot_eigen_hist: true
  plot_eigen_density: true

benchmark:
  enabled: true
